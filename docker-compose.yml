name: demiurge-ai-canvas

services:
  web-gateway:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        DOCKER_BASE_REGISTRY: ${DOCKER_BASE_REGISTRY:-docker.m.daocloud.io/library}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://mirrors.huaweicloud.com/repository/npm/}
    image: demiurge-ai-canvas/web-gateway:latest
    ports:
      - "${PUBLIC_PORT:-80}:80"
    depends_on:
      - node-api
      - python-media-api
    restart: unless-stopped

  node-api:
    build:
      context: ./backend/node
      dockerfile: Dockerfile
      args:
        DOCKER_BASE_REGISTRY: ${DOCKER_BASE_REGISTRY:-docker.m.daocloud.io/library}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://mirrors.huaweicloud.com/repository/npm/}
    image: demiurge-ai-canvas/node-api:latest
    env_file:
      - ./backend/node/.env.local
    environment:
      NODE_API_HOST: 0.0.0.0
      NODE_API_PORT: 3200
      PROJECTS_ROOT: /app/projects
      MATERIAL_LIBRARY_ROOT: /app/material-library
    volumes:
      - ./data/projects:/app/projects
      - ./data/material-library:/app/material-library
    expose:
      - "3200"
    restart: unless-stopped

  python-media-api:
    build:
      context: ./backend/python
      dockerfile: Dockerfile
      args:
        DOCKER_BASE_REGISTRY: ${DOCKER_BASE_REGISTRY:-docker.m.daocloud.io/library}
    image: demiurge-ai-canvas/python-media-api:latest
    env_file:
      - ./backend/python/.env.local
    environment:
      PY_MEDIA_API_HOST: 0.0.0.0
      PY_MEDIA_API_PORT: 3300
      PROJECTS_ROOT: /app/projects
      OUTPUTS_ROOT: /app/outputs
      MATERIAL_LIBRARY_ROOT: /app/material-library
    volumes:
      - ./data/projects:/app/projects
      - ./data/material-library:/app/material-library
      - ./data/outputs:/app/outputs
    expose:
      - "3300"
    restart: unless-stopped
